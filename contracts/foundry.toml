# Two profiles, one source tree:
#   default — vanilla EVM compile (for tests + reference deploys to mainnet
#             Aave forks, etc.)
#   pvm     — PolkaVM compile via resolc, the bytecode that actually runs on
#             Theseus (pallet-revive). Mirror of the pattern in
#             github.com/Theseuschain/theseus-layerzero-evm/packages/oapp.
#
# Theseus deploys go through `forge --profile pvm`. This requires the
# foundry-polkadot fork (Parity's `forge` with resolc support). See the
# top-level README for install steps.

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
script = "script"
test = "test"
solc = "0.8.10"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "./deployments" }]
remappings = [
    "aave-v3-core/=lib/aave-v3-core/contracts/",
    "@aave/core-v3/=lib/aave-v3-core/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 256

# PolkaVM (pallet-revive) compile. Required to deploy to Theseus EVM.
[profile.pvm]
src = "src"
out = "out-pvm"
libs = ["lib"]
script = "script"
test = "xxx-no-tests"
solc = "0.8.22"
optimizer = true
optimizer_runs = 200
cache_path = "cache/pvm"
fs_permissions = [{ access = "read-write", path = "./deployments" }]
remappings = [
    "aave-v3-core/=lib/aave-v3-core/contracts/",
    "@aave/core-v3/=lib/aave-v3-core/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.pvm.polkadot]
resolc_compile = true

[rpc_endpoints]
# Theseus exposes an Ethereum-compatible RPC via the `eth-rpc` proxy at 8545.
# (Substrate WS is at 9944 for non-EVM extrinsics.)
theseus_local = "${THESEUS_EVM_RPC_LOCAL}"
theseus_devnet = "${THESEUS_EVM_RPC_DEVNET}"

[etherscan]
# Theseus's block explorer config goes here once a public devnet exposes one.
